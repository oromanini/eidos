name: Deploy Eidos to GCP

on:
  push:
    branches:
      - master

env:
  PROJECT_ID: eidos-491801
  REGION: us-central1
  REPO_NAME: eidos-repo
  IMAGE_NAME: eidos-app
  WIF_PROVIDER: 'projects/984601237646/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
  SERVICE_ACCOUNT: 'github-actions-deploy-sa@eidos-491801.iam.gserviceaccount.com'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Autenticação no Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Login no Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build e Push da Imagem Docker
        run: |
          IMAGE_PATH="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -f Dockerfile.prod -t $IMAGE_PATH .
          docker push $IMAGE_PATH

      - name: Deploy no Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: eidos-web
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: --allow-unauthenticated
          env_vars: |
            APP_ENV=production
            APP_DEBUG=true
            LOG_CHANNEL=stderr
            APP_KEY=${{ secrets.APP_KEY }}
            DB_CONNECTION=mongodb
            MONGODB_URL=${{ secrets.MONGO_ATLAS_URI }}